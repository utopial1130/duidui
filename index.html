<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>预约系统</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: #3390ec;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
    }
    #result {
      margin-top: 20px;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>📅 可预约课程</h2>

<div class="card">
  <span>单次 · 1000¥</span>
  <button onclick="book('单次')">预约</button>
</div>

<div class="card">
  <span>两次 · 1600¥</span>
  <button onclick="book('两次')">预约</button>
</div>

<div class="card">
  <span>包时 · 4000¥</span>
  <button onclick="book('包时')">预约</button>
</div>

<div class="card">
  <span>包夜 · 5200¥</span>
  <button onclick="book('包夜')">预约</button>
</div>

<div id="result"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

// ✅ 你的配置（已经帮你填好 URL）
const SUPABASE_URL = "https://yflgpxchxryhjwwwvogI.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmbGdweGNoeHJ5aGp3d3Z2b2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODIyMDAsImV4cCI6MjA5MTE1ODIwMH0.WKFU27HoK8_KKMFO1h11XNEL2QOFtw-51lH4a4RrjkA";

function book(type) {
  const user = tg.initDataUnsafe?.user;

  if (!user) {
    alert("❌ 请在Telegram中打开");
    return;
  }

  fetch(SUPABASE_URL + "/rest/v1/orders", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({
      user_id: String(user.id),
      name: user.first_name,
      course: type
    })
  })
  .then(res => {
    if (res.ok) {
      document.getElementById("result").innerHTML = `
        <h3>预约成功 🎉</h3>
        <p>用户：${user.first_name}</p>
        <p>课程：${type}</p>
      `;
    } else {
      alert("❌ 保存失败（权限问题）");
    }
  })
  .catch(() => {
    alert("❌ 网络错误");
  });
}
</script>

</body>
</html>
