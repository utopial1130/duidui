<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>预约系统</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
    }
    button {
      float: right;
      background: #3390ec;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>📅 可预约课程</h2>

<div class="card">
  单次 · 1000¥
  <button onclick="book('单次')">预约</button>
</div>

<div class="card">
  两次 · 1600¥
  <button onclick="book('两次')">预约</button>
</div>

<div class="card">
  包时 · 4000¥
  <button onclick="book('包时')">预约</button>
</div>

<div class="card">
  包夜 · 5200¥
  <button onclick="book('包夜')">预约</button>
</div>

<hr>

<div id="result"></div>

<script>
const tg = window.Telegram?.WebApp;

function book(type) {
  const user = tg?.initDataUnsafe?.user;

  document.getElementById("result").innerHTML = `
    <h3>预约成功 🎉</h3>
    用户: ${user?.first_name || "未知"} <br>
    课程: ${type}
  `;
}
</script>

</body>
</html>
