<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>预约系统</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 15px;
}

h2 {
  margin-bottom: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: #3390ec;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
}

.disabled {
  background: gray;
}

.section {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>📅 可预约课程</h2>

<div id="courseList"></div>

<div class="section">
  <h2>📋 我的预约</h2>
  <div id="orders">加载中...</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

// ✅ 你的配置（已经帮你填好 URL） 
const SUPABASE_URL = "https://yflgpxchxryhjwwvvogl.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmbGdweGNoeHJ5aGp3d3Z2b2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODIyMDAsImV4cCI6MjA5MTE1ODIwMH0.WKFU27HoK8_KKMFO1h11XNEL2QOFtw-51lH4a4RrjkA";

const user = tg.initDataUnsafe?.user;

const courses = [
  {name: "单次", price: "1000¥"},
  {name: "两次", price: "1600¥"},
  {name: "包时", price: "4000¥"},
  {name: "包夜", price: "5200¥"}
];

let hasOrder = false;

// 渲染课程
function renderCourses() {
  const box = document.getElementById("courseList");
  box.innerHTML = "";

  courses.forEach(c => {
    box.innerHTML += `
      <div class="card">
        <span>${c.name} · ${c.price}</span>
        <button onclick="book('${c.name}')" ${hasOrder ? "class='disabled'" : ""}>
          ${hasOrder ? "已预约" : "预约"}
        </button>
      </div>
    `;
  });
}

// 预约（防重复）
function book(type) {
  if (hasOrder) {
    alert("❌ 你已经预约过了");
    return;
  }

  fetch(SUPABASE_URL + "/rest/v1/orders", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({
      user_id: String(user.id),
      name: user.first_name,
      course: type
    })
  }).then(() => {
    loadOrders();
  });
}

// 加载订单
function loadOrders() {
  fetch(SUPABASE_URL + "/rest/v1/orders?user_id=eq." + user.id, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  })
  .then(res => res.json())
  .then(data => {
    const box = document.getElementById("orders");

    if (data.length === 0) {
      hasOrder = false;
      box.innerHTML = "暂无预约";
    } else {
      hasOrder = true;

      box.innerHTML = "";
      data.forEach(item => {
        box.innerHTML += `
          <div class="card">
            <span>${item.course}</span>
            <span>进行中</span>
          </div>
        `;
      });
    }

    renderCourses(); // 更新按钮状态
  });
}

// 初始化
if (user) {
  loadOrders();
}
</script>

</body>
</html>
